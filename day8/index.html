<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Tip calculator app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-light-grayish-cyan font-mono flex flex-col items-center justify-center min-h-screen py-8 px-0 md:py-12">
  <header class="mb-10 md:mb-20">
    <img src="./images/logo.svg" alt="Splitter Logo" class="mx-auto">
  </header>

  <main class="bg-white rounded-3xl p-8 w-full max-w-[920px] shadow-2xl flex flex-col md:flex-row gap-8 md:gap-12">
    <!-- Input Section -->
    <div class="flex flex-col gap-8 flex-1">
      <!-- Bill -->
      <div class="flex flex-col gap-2">
        <label for="bill" class="text-dark-grayish-cyan font-bold text-base">Bill</label>
        <div class="relative">
          <img src="./images/icon-dollar.svg" alt="dollar icon" class="absolute left-4 top-1/2 -translate-y-1/2">
          <input type="number" id="bill"
            class="w-full bg-very-light-grayish-cyan border-2 border-transparent rounded focus:border-strong-cyan focus:outline-none py-2 px-4 pl-10 text-right text-2xl text-very-dark-cyan font-bold placeholder-grayish-cyan/50 cursor-pointer transition-colors"
            placeholder="0" min="0">
        </div>
      </div>

      <!-- Select Tip -->
      <div class="flex flex-col gap-4">
        <label class="text-dark-grayish-cyan font-bold text-base">Select Tip %</label>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <button
            class="tip-btn bg-very-dark-cyan text-white text-xl font-bold rounded py-3 hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors"
            data-tip="5">5%</button>
          <button
            class="tip-btn bg-very-dark-cyan text-white text-xl font-bold rounded py-3 hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors"
            data-tip="10">10%</button>
          <button
            class="tip-btn bg-very-dark-cyan text-white text-xl font-bold rounded py-3 hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors"
            data-tip="15">15%</button>
          <button
            class="tip-btn bg-very-dark-cyan text-white text-xl font-bold rounded py-3 hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors"
            data-tip="25">25%</button>
          <button
            class="tip-btn bg-very-dark-cyan text-white text-xl font-bold rounded py-3 hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors"
            data-tip="50">50%</button>
          <input type="number" id="custom-tip"
            class="w-full bg-very-light-grayish-cyan border-2 border-transparent rounded focus:border-strong-cyan focus:outline-none p-3 text-center text-xl text-very-dark-cyan font-bold placeholder-dark-grayish-cyan placeholder-opacity-80 transition-colors cursor-pointer "
            placeholder="Custom" min="0">
        </div>
      </div>

      <!-- Number of People -->
      <div class="flex flex-col gap-2">
        <div class="flex justify-between">
          <label for="people" class="text-dark-grayish-cyan font-bold text-base">Number of People</label>
          <span id="people-error-msg" class="text-error font-bold text-base hidden">Can't be zero</span>
        </div>
        <div class="relative">
          <img src="./images/icon-person.svg" alt="person icon" class="absolute left-4 top-1/2 -translate-y-1/2">
          <input type="number" id="people"
            class="w-full bg-very-light-grayish-cyan border-2 border-transparent rounded focus:border-strong-cyan focus:outline-none py-2 px-4 pl-10 text-right text-2xl text-very-dark-cyan font-bold placeholder-grayish-cyan/50 cursor-pointer transition-colors"
            placeholder="0" min="0">
        </div>
      </div>
    </div>

    <!-- Output Section -->
    <div class="bg-very-dark-cyan rounded-2xl p-6 md:p-10 flex flex-col justify-between gap-8 flex-1">
      <div class="flex flex-col gap-6 md:gap-10 pt-4">
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-white text-base font-bold">Tip Amount</h2>
            <p class="text-grayish-cyan text-sm font-bold">/ person</p>
          </div>
          <div class="text-strong-cyan text-4xl md:text-5xl font-bold tracking-tighter" id="tip-amount">$0.00</div>
        </div>

        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-white text-base font-bold">Total</h2>
            <p class="text-grayish-cyan text-sm font-bold">/ person</p>
          </div>
          <div class="text-strong-cyan text-4xl md:text-5xl font-bold tracking-tighter" id="total-amount">$0.00</div>
        </div>
      </div>

      <button id="reset-btn"
        class="w-full bg-strong-cyan text-very-dark-cyan text-xl font-bold rounded p-3 uppercase hover:bg-light-grayish-cyan transition-colors disabled:opacity-20 disabled:cursor-not-allowed"
        disabled>RESET</button>
    </div>
  </main>

  <script src="./app.js"></script>
</body>

</html>
